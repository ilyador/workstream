<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkStream</title>
    <style>
      html { background: #FBFBFA; color: #1A1A1A; }
      html[data-theme="dark"] { background: #141413; color: #E8E8E4; }
      html[data-theme="dark"] input, html[data-theme="dark"] button { color-scheme: dark; }
    </style>
  </head>
  <body>
    <script>
      // Apply theme before paint to prevent flash
      (function() {
        var stored = localStorage.getItem('workstream-theme');
        var theme = stored || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/web/main.tsx"></script>
  </body>
</html>
